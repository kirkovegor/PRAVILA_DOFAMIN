<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ДОФАМИН // KAVKAZ 2.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;600;900&family=Courier+Prime:wght@400;700&display=swap');
        :root { --main: #ff007f; --bg: #0f0f12; --text: #ffffff; }
        html, body { margin: 0; padding: 0; background: radial-gradient(circle at center, #1a1a20, #050505); color: var(--text) !important; font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: hidden; }
        body { display: flex; justify-content: center; align-items: flex-start; padding: 20px; box-sizing: border-box; }
        .wrapper { display: flex; gap: 20px; align-items: flex-start; width: 100%; max-width: 950px; justify-content: center; flex-wrap: wrap; }
        
        /* Sidebar */
        .admin-sidebar { width: 220px; display: flex; flex-direction: column; gap: 20px; flex-shrink: 0; }
        .admin-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); padding: 15px; border-radius: 25px; display: flex; align-items: center; gap: 15px; transition: 0.4s; }
        .admin-box:hover { border-color: var(--main); transform: translateY(-5px); }
        .admin-avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 1px solid var(--main); }
        .admin-info { text-align: left; }
        .admin-rank { color: var(--main); font-size: 0.55em; text-transform: uppercase; letter-spacing: 2px; }
        .admin-name { font-size: 0.9em; font-weight: 600; }
        .admin-tag { font-size: 0.65em; color: #888; font-family: 'Courier Prime'; }
        
        /* Main */
        .main-container { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; flex-shrink: 0; }
        .content-box { background: rgba(255, 255, 255, 0.03); padding: 30px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.05); }
        .avatar { width: 120px; height: 120px; margin: 0 auto 30px; border-radius: 30px; border: 2px solid var(--main); overflow: hidden; box-shadow: 0 0 20px rgba(255, 0, 127, 0.2); }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        h1 { font-size: 1.8em; margin: 0; color: var(--main); text-align: center; }
        .sub-h1 { text-align: center; color: var(--main); font-size: 0.5em; letter-spacing: 4px; margin-bottom: 20px; }
        
        .rule-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); padding: 15px; margin: 8px 0; border-radius: 15px; cursor: pointer; transition: 0.4s ease; font-size: 0.85em; color: #fff; }
        .rule-btn:hover { border-color: var(--main); background: rgba(255,0,127,0.1); transform: translateX(10px); }
        .rule-btn.active { border-color: var(--main); background: rgba(255,0,127,0.2); }

        /* Panel */
        .detail-panel { position: fixed; left: -400px; top: 20px; width: 350px; height: 90vh; background: #0c0c0f; border-radius: 0 40px 40px 0; border: 1px solid var(--main); transition: 0.7s cubic-bezier(0.16, 1, 0.3, 1); padding: 30px; z-index: 100; box-shadow: 20px 0 50px rgba(0,0,0,0.5); }
        .detail-panel.active { left: 0; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.6s ease forwards; }

        #detailImg { width: 100%; border-radius: 20px; margin-bottom: 20px; border: 1px solid var(--main); }
        .detail-title { color: var(--main); font-size: 1.4em; font-weight: 900; margin-bottom: 10px; }
        .detail-text { font-size: 0.95em; line-height: 1.6; color: #eee; white-space: pre-line; }

        @media (max-width: 850px) { .wrapper { flex-direction: column; align-items: center; } .detail-panel { width: 100%; left: -100%; border-radius: 0; } }</style>
</head>
<body>
    <div class="wrapper">
        <div class="admin-sidebar">
            <div class="admin-box">
                <img src="алена.jpg" class="admin-avatar" alt="Алёна">
                <div class="admin-info"><div class="admin-rank">ГЛАВНЫЙ</div><div class="admin-name">Алёна</div><div class="admin-tag">УПРАВЛЕНИЕ</div></div>
            </div>
            <div class="admin-box">
                <img src="лина.jpg" class="admin-avatar" alt="ليна">
                <div class="admin-info"><div class="admin-rank">МОДЕРАТОР</div><div class="admin-name">لينا</div><div class="admin-tag">Начальник Чата</div></div>
            </div>
            <div class="admin-box">
                <img src="ханна.jpg" class="admin-avatar" alt="Ханна">
                <div class="admin-info"><div class="admin-rank">МОДЕРАТОР</div><div class="admin-name">Ханна</div><div class="admin-tag">Малыш Мага</div></div>
            </div>
        </div>
        
        <div class="main-container">
            <div class="content-box">
                <div class="avatar"><img src="photo_2026-07-04_16-19-39.jpg" alt="Avatar"></div>
                <h1>ДОФАМИН</h1>
                <div class="sub-h1">KAVKAZ 2.0</div>
                <div id="list">
                    <div class="rule-btn" onclick="showDetail(this, 'Возраст', 'Нарушение: Младше 16 лет\nНаказание: Бан', '16')">Возраст</div>
                    <div class="rule-btn" onclick="showDetail(this, 'Мат', 'Нарушение: Мат, оскорбления, унижения\nНаказание: Мут 15 мин, повторно — 1 час', 'мат')">Мат</div>
                    <div class="rule-btn" onclick="showDetail(this, 'Религия', 'Нарушение: Оскорбление религии\nНаказание: Бан', 'религия')">Религия</div>
                    <div class="rule-btn" onclick="showDetail(this, 'Родители', 'Нарушение: Оскорбление родителей\nНаказание: Бан', 'семья')">Родители</div>
                    <div class="rule-btn" onclick="showDetail(this, 'Нация', 'Нарушение: Высмеивание нации\nНаказание: Мут 15 мин, повторно — 1 час', 'нация')">Нация</div>
                    <div class="rule-btn" onclick="showDetail(this, 'Политика', 'Нарушение: Политический спор (в т.ч. СВО)\nНаказание: Мут 15 мин, повторно — 1 час', 'политика')">Политика</div>
                    <div class="rule-btn" onclick="showDetail(this, 'Докс', 'Нарушение: Угрозы доксом, пробивание\nНаказание: Бан', 'докс')">Докс</div>
                    <div class="rule-btn" onclick="showDetail(this, 'Контент', 'Нарушение: Шок-контент, 18+\nНаказание: Мут 15 мин, повторно — 1 час', 'шок18+')">Контент</div>
                    <div class="rule-btn" onclick="showDetail(this, 'Попрошайничество', 'Нарушение: Попрошайничество\nНаказание: Мут 1 час', 'бомж')">Попрошайничество</div>
                    <div class="rule-btn" onclick="showDetail(this, 'Реклама', 'Нарушение: Реклама в чате\nНаказание: Мут 1 час', 'реклама')">Реклама</div>
                    <div class="rule-btn" onclick="showDetail(this, 'Наркотики', 'Нарушение: Обсуждение наркотиков\nНаказание: Мут 15 мин', 'наркотики')">Наркотики</div>
                </div>
            </div>
        </div>

        <div class="detail-panel" id="detailPanel" onclick="this.classList.remove('active')">
            <div id="panelContent" class="fade-in">
                <img id="detailImg" src="" alt="Rule">
                <div class="detail-title" id="dTitle">Информация</div>
                <div class="detail-text" id="dText">Выберите правило...</div>
            </div>
        </div>
    </div>

    <script>
        function showDetail(el, title, text, imgName) {
            const panel = document.getElementById('detailPanel');
            const content = document.getElementById('panelContent');
            content.classList.remove('fade-in');
            void content.offsetWidth;document.getElementById('dTitle').innerText = title;
            document.getElementById('dText').innerText = text;
            document.getElementById('detailImg').src = imgName + '.jpg';
            document.querySelectorAll('.rule-btn').forEach(btn => btn.classList.remove('active'));
            el.classList.add('active');
            content.classList.add('fade-in');
            panel.classList.add('active');
        }
    </script>
</body>
</html>
